name: Sync Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"

permissions:
  contents: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    name: Merge upstream main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config rerere.enabled true
          git config rerere.autoupdate true

      - name: Restore rerere cache
        uses: actions/cache@v4
        with:
          path: .git/rr-cache
          key: rerere-main-${{ github.repository }}-${{ github.run_id }}
          restore-keys: |
            rerere-main-${{ github.repository }}-

      - name: Fetch upstream
        run: |
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/Wei-Shaw/sub2api.git
          else
            git remote add upstream https://github.com/Wei-Shaw/sub2api.git
          fi
          git fetch upstream main

      - name: Merge upstream main
        run: |
          set +e
          git merge --no-edit upstream/main
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          conflicts="$(git diff --name-only --diff-filter=U || true)"
          if [ -z "$conflicts" ] && ! git diff --cached --quiet; then
            git commit --no-edit
            exit 0
          fi

          allowed_conflicts="$(printf '%s\n' "$conflicts" | grep -E '^\.github/workflows/(backend-ci|cla|release|security-scan)\.yml$' || true)"
          blocked_conflicts="$(printf '%s\n' "$conflicts" | grep -vE '^\.github/workflows/(backend-ci|cla|release|security-scan)\.yml$' || true)"

          if [ -n "$blocked_conflicts" ]; then
            echo "Upstream merge has conflicts outside removable fork workflows:"
            printf '%s\n' "$blocked_conflicts"
            exit 1
          fi

          if [ -z "$allowed_conflicts" ]; then
            echo "Upstream merge failed without a known removable workflow conflict."
            exit 1
          fi

          rm -f \
            .github/workflows/backend-ci.yml \
            .github/workflows/cla.yml \
            .github/workflows/release.yml \
            .github/workflows/security-scan.yml
          git add .github/workflows
          git commit --no-edit

      - name: Keep fork workflows only
        run: |
          find .github/workflows -type f \
            ! -name "build.yml" \
            ! -name "sync-upstream.yml" \
            -delete

          git add .github/workflows
          if git diff --cached --quiet; then
            echo "No workflow cleanup needed."
          else
            git commit -m "ci: keep fork workflows only"
          fi

      - name: Verify fork patch is still applied
        run: |
          bash .github/scripts/verify-fork-hotpath.sh

      - name: Run focused backend tests
        working-directory: backend
        env:
          GOCACHE: ${{ github.workspace }}/.tmp/go-build-cache
          GOTMPDIR: ${{ github.workspace }}/.tmp/go-tmp
        run: |
          mkdir -p "$GOCACHE" "$GOTMPDIR"
          trap 'rm -rf "$GOCACHE" "$GOTMPDIR"' EXIT
          go test ./internal/repository ./internal/service ./internal/handler ./internal/server

      - name: Set image metadata
        run: |
          echo "HEAD_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/sub2api" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:latest
          build-args: |
            VERSION=main
            COMMIT=${{ env.HEAD_SHA }}
          cache: false

      - name: Push synced main
        run: |
          git push origin HEAD:main

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker push "${IMAGE_NAME}:latest"
